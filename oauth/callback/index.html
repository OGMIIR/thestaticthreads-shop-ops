<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TheStaticThreads Shop Ops OAuth Callback</title>
  <style>
    :root {
      --ink: #211a24;
      --muted: #5f5663;
      --line: #ded8df;
      --bg: #faf8f5;
      --panel: #ffffff;
      --accent: #355c45;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    main {
      width: min(860px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 2.2rem;
      letter-spacing: 0;
    }
    p {
      color: var(--muted);
    }
    code, pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    pre {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .warn {
      border-left: 4px solid var(--accent);
      background: var(--panel);
      padding: 14px 16px;
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>OAuth Callback</h1>
    <p>This page is used by TheStaticThreads Shop Ops during Etsy OAuth setup. It does not store, send, or save authorization data.</p>
    <div class="warn">
      <p>Only use this page when intentionally authorizing TheStaticThreads Shop Ops through Etsy's official OAuth flow.</p>
    </div>
    <h2>Received Parameters</h2>
    <pre id="params">Loading...</pre>
    <script>
      const params = new URLSearchParams(window.location.search);
      const safe = {};
      for (const [key, value] of params.entries()) {
        safe[key] = value;
      }
      document.getElementById("params").textContent = JSON.stringify(safe, null, 2);
    </script>
  </main>
</body>
</html>
